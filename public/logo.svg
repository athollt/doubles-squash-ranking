<svg width="220" height="64" viewBox="0 0 220 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rungs">
  <!-- "Climb" mark on a transparent ground (works on light or dark) -->
  <rect x="6" y="40" width="20" height="6" rx="3" fill="#4F46E5" opacity="0.5"/>
  <rect x="14" y="30" width="20" height="6" rx="3" fill="#4F46E5" opacity="0.7"/>
  <rect x="22" y="20" width="20" height="6" rx="3" fill="#4F46E5"/>
  <rect x="30" y="10" width="20" height="6" rx="3" fill="#FB7185"/>
  <!-- Wordmark uses currentColor so it inverts in dark mode -->
  <text x="64" y="42" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="700" fill="currentColor">Rungs</text>
</svg>
