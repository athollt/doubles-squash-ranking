<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rungs icon">
  <!-- Rungs "Climb" mark (step 24): four rounded rungs stepping up-and-right on an
       indigo badge; white rungs fade up to a coral top. Indigo ground (not near-
       black) keeps the mark legible at small header sizes. -->
  <rect width="512" height="512" rx="112" fill="#4F46E5"/>
  <rect x="114" y="341" width="142" height="44" rx="22" fill="#FFFFFF" opacity="0.55"/>
  <rect x="171" y="270" width="142" height="44" rx="22" fill="#FFFFFF" opacity="0.78"/>
  <rect x="228" y="199" width="142" height="44" rx="22" fill="#FFFFFF"/>
  <rect x="284" y="128" width="142" height="44" rx="22" fill="#FB7185"/>
</svg>
